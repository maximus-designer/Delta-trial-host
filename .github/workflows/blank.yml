name: Secure RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Configure Windows RDP
        shell: powershell
        run: |
          Write-Host "Enabling RDP..."

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          Restart-Service TermService -Force

      - name: Create RDP User
        shell: powershell
        run: |
          Write-Host "Creating RDP user..."

          $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'
          $password = -join ((1..20) | ForEach-Object {
            $chars[(Get-Random -Maximum $chars.Length)]
          })

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name "RDP"
          }

          New-LocalUser `
            -Name "RDP" `
            -Password $securePass `
            -AccountNeverExpires `
            -PasswordNeverExpires

          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..."

          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest `
            -Uri $url `
            -OutFile $installer

          Start-Process msiexec.exe `
            -ArgumentList "/i `"$installer`" /qn /norestart" `
            -Wait

          Remove-Item $installer -Force

      - name: Connect Tailscale
        shell: powershell
        run: |
          Write-Host "Connecting to Tailscale..."

          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"

          Start-Service Tailscale

          Start-Sleep -Seconds 10

          & $tailscale up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}" `
            --accept-routes `
            --reset

          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tailscale failed"
            exit 1
          }

          $ip = $null

          for ($i = 0; $i -lt 20; $i++) {
            try {
              $ip = (& $tailscale ip -4 | Select-Object -First 1).Trim()
            } catch {}

            if ($ip) {
              break
            }

            Start-Sleep -Seconds 5
          }

          if (-not $ip) {
            Write-Error "No Tailscale IP assigned"
            exit 1
          }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

          Write-Host ""
          Write-Host "================================="
          Write-Host "TAILSCALE STATUS"
          Write-Host "================================="
          & $tailscale status

      - name: Verify Public IP
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "================================="
          Write-Host "PUBLIC IP"
          Write-Host "================================="

          $publicIP = Invoke-RestMethod "https://api.ipify.org"

          Write-Host ""
          Write-Host "Public IP: $publicIP"
          Write-Host ""

      - name: Verify RDP Port
        shell: powershell
        run: |
          Write-Host "Checking RDP..."

          $success = $false

          for ($i = 0; $i -lt 10; $i++) {

            $test = Test-NetConnection `
              -ComputerName $env:TAILSCALE_IP `
              -Port 3389 `
              -WarningAction SilentlyContinue

            if ($test.TcpTestSucceeded) {
              $success = $true
              break
            }

            Start-Sleep -Seconds 10
          }

          if (-not $success) {
            Write-Error "RDP not reachable"
            exit 1
          }

          Write-Host "RDP reachable."

      - name: Show Connection Details
        shell: powershell
        run: |
          Clear-Host

          Write-Host ""
          Write-Host "======================================="
          Write-Host "            RDP READY"
          Write-Host "======================================="
          Write-Host ""
          Write-Host "IP       : $env:TAILSCALE_IP"
          Write-Host "Username : RDP"
          Write-Host "Password : $env:RDP_PASSWORD"
          Write-Host ""
          Write-Host "======================================="
          Write-Host ""

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Keeping runner alive for 6 hours..."

          $endTime = (Get-Date).AddMinutes(355)

          while ((Get-Date) -lt $endTime) {
            Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] Runner active..."
            Start-Sleep -Seconds 60
          }

          Write-Host "Session timeout reached. Shutting down gracefully."
