          Write-Host "Access from your PC: http://$env:TAILSCALE_IP`:8080"
          Write-Host ""
          if ($env:CLOUDFLARE_TUNNEL_URL) {
            Write-Host "PUBLIC ACCESS (via Cloudflare Tunnel):"
