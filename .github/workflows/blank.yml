name: Secure RDP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Record Start Time and Enforce Timing Rules
        shell: powershell
        run: |
          $epoch = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          echo "START_TIME=$epoch" >> $env:GITHUB_ENV
          Write-Host "Workflow started at Unix epoch: $epoch"
          
          $currentRunId = "$env:GITHUB_RUN_ID"
          if ([string]::IsNullOrEmpty($currentRunId)) {
            Write-Host "Local testing or missing run ID. Skipping check."
            exit 0
          }
          
          # Fetch recent runs of the same workflow
          $runsJson = gh run list --workflow secure-rdp.yml --repo "$env:GITHUB_REPOSITORY" --limit 10 --json databaseId,status,startedAt
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Failed to fetch run list from GitHub API. Proceeding..."
            exit 0
          }
          
          $runs = $runsJson | ConvertFrom-Json
          $hasActiveOverlap = $false
          
          foreach ($run in $runs) {
            if ($run.databaseId -ne $currentRunId -and $run.status -ne 'completed') {
              $startedAt = [DateTime]::Parse($run.startedAt).ToUniversalTime()
              $now = [DateTime]::UtcNow
              $elapsedMinutes = ($now - $startedAt).TotalMinutes
              
              Write-Host "Found other active run: ID=$($run.databaseId), Status=$($run.status), StartedAt=$startedAt ($elapsedMinutes minutes ago)"
              
              # If the active run started less than 5 hours and 48 minutes ago (348 minutes to be safe with minor delays)
              if ($elapsedMinutes -lt 348) {
                $hasActiveOverlap = $true
                break
              }
            }
          }
          
          if ($hasActiveOverlap) {
            Write-Host "Another active workflow run was started recently (less than 5 hours and 50 minutes ago)."
            Write-Host "Cancelling this run to enforce timing rules and prevent overlap..."
            gh run cancel $currentRunId --repo "$env:GITHUB_REPOSITORY"
            Start-Sleep -Seconds 60
            exit 1
          } else {
            Write-Host "Timing check passed. No overlapping active runs found."
          }

      - name: Connect Netherlands Proxy (SOCKS5)
        shell: powershell
        run: |
          function log { param($m) Write-Host "$m"; [Console]::Out.Flush() }

          $proxyList = @(
            "socks5://5.255.117.250:1080",
            "socks5://185.233.184.165:1080",
            "socks5://5.255.113.177:1080"
          )

          $selected = $null
          $selectedIp = $null

          foreach ($p in $proxyList) {
            log "Testing $p ..."
            try {
              $ip = curl.exe -x $p -s -m 10 https://api.ipify.org 2>$null
              if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                $selected = $p
                $selectedIp = $ip.Trim()
                log "WORKING: $p (IP: $selectedIp)"
                break
              }
            } catch { log "Failed: $p" }
          }

          if (-not $selected) { Write-Error "No working SOCKS5 proxy found"; exit 1 }

          echo "ALL_PROXY=$selected" >> $env:GITHUB_ENV
          echo "all_proxy=$selected" >> $env:GITHUB_ENV
          echo "SOCKS_PROXY=$selected" >> $env:GITHUB_ENV

          & git config --global http.proxy $selected
          & git config --global https.proxy $selected
          log "[OK] Git configured to use $selected"
          
          # DON'T set system-wide proxy yet - it breaks winget and GitHub Actions
          # We'll set it AFTER setup.bat completes
          log "[OK] Proxy configured for Git operations"

          log "Verifying proxy egress..."
          try {
            $ip = curl.exe -x $selected -s -m 10 https://api.ipify.org 2>$null
            $LASTEXITCODE = 0
            $loc = curl.exe -x $selected -s -m 10 https://ipinfo.io/json 2>$null | ConvertFrom-Json
            $LASTEXITCODE = 0
            log "Public IP: $ip / $($loc.country) - $($loc.org)"
          } catch { log "Verification failed: $_" }
          $LASTEXITCODE = 0
          log "[OK] Netherlands SOCKS5 proxy configured."

      - name: Configure Windows RDP
        shell: powershell
        run: |
          Write-Host "Configuring RDP..."

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fSingleSessionPerUser" -Value 0 -Force

          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False -ErrorAction SilentlyContinue
          Stop-Service -Name mpssvc -Force -ErrorAction SilentlyContinue
          Set-Service -Name mpssvc -StartupType Disabled -ErrorAction SilentlyContinue

          Restart-Service TermService -Force
          Start-Sleep -Seconds 5

          Write-Host "[OK] RDP configured and listening on port 3389"

      - name: Create RDP User
        shell: powershell
        run: |
          $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'
          $password = -join ((1..20) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          Write-Host "[OK] RDP user created"

      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..."
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /qn /norestart" -Wait
          Remove-Item $installer -Force
          Write-Host "[OK] Tailscale installed"

      - name: Install FFmpeg
        shell: powershell
        run: |
          Write-Host "Installing FFmpeg via Chocolatey..."
          choco install ffmpeg -y --no-progress
          Write-Host "[OK] FFmpeg installed"
          refreshenv
          $ffver = & ffmpeg.exe -version 2>&1
          Write-Host "Version: $($ffver | Select-Object -First 1)"

      - name: Check Tailscale Auth Key
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_AUTH_KEY)) {
            Write-Error "TAILSCALE_AUTH_KEY secret is EMPTY or NOT SET"
            Write-Host "Go to: https://github.com/lawdachuss/rdp-goondvr/settings/secrets/actions"
            exit 1
          }
          Write-Host "[OK] TAILSCALE_AUTH_KEY is set (length: $($env:TAILSCALE_AUTH_KEY.Length))"

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"

          $svc = Get-Service -Name Tailscale -ErrorAction SilentlyContinue
          if ($null -eq $svc) { Write-Error "Tailscale service not found"; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service Tailscale -ErrorAction Stop }

          Write-Host "Waiting for Tailscale daemon..."
          $ready = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $out = & $tailscale status 2>&1
              if ($LASTEXITCODE -eq 0 -or ($out -match "Logged out|NeedsLogin|Running|stopped")) { $ready = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ready) { Write-Error "Tailscale daemon not ready after 30s"; exit 1 }

          Write-Host "Authenticating Tailscale..."
          & $tailscale up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false `
            --timeout=60s `
            --reset
          if ($LASTEXITCODE -ne 0) { Write-Error "tailscale up failed"; exit 1 }

          Write-Host "-------- TAILSCALE STATUS --------"
          & $tailscale status

          $ip = $null
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $candidate = (& $tailscale ip -4 2>&1 | Select-Object -First 1).Trim()
              if ($candidate -match '^\d+\.\d+\.\d+\.\d+$') { $ip = $candidate; break }
            } catch {}
            Start-Sleep -Seconds 3
          }
          if (-not $ip) { Write-Error "No Tailscale IP assigned after 45s"; exit 1 }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "[OK] Tailscale IP: $ip"

      - name: Verify Proxy + Tailscale
        shell: powershell
        run: |
          Write-Host "=== PROXY SETTINGS ==="
          Write-Host "ALL_PROXY=$env:ALL_PROXY"
          Write-Host "GIT proxy: $(git config --global http.proxy)"
          Write-Host ""
          Write-Host "=== TAILSCALE ==="
          if ($env:TAILSCALE_IP) { Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue | Select-Object ComputerName, TcpTestSucceeded }

      - name: Verify RDP via Tailscale
        shell: powershell
        run: |
          Write-Host "Checking RDP on $env:TAILSCALE_IP:3389..."
          $success = $false
          for ($i = 0; $i -lt 10; $i++) {
            $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
            if ($test.TcpTestSucceeded) { $success = $true; break }
            Write-Host "Attempt $($i+1)/10 failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          if (-not $success) { Write-Error "RDP port 3389 not reachable on $env:TAILSCALE_IP after 100s"; exit 1 }
          Write-Host "[OK] RDP reachable via Tailscale."

      - name: Clone MiniDelectableService to D:\
        shell: powershell
        run: |
          $repoDir = "D:\repos\MiniDelectableService"
          New-Item -ItemType Directory -Force -Path "D:\repos" | Out-Null
          if (Test-Path $repoDir) { Remove-Item -Recurse -Force $repoDir }
          Write-Host "Downloading fixed MiniDelectableService repo (with GitHub Actions compatible setup.bat)..."
          
          # Download as ZIP to bypass git proxy issues
          $zipUrl = "https://github.com/lawdachuss/MiniDelectableService/archive/refs/heads/main.zip"
          $zipFile = "$env:TEMP\MiniDelectableService.zip"
          
          # Temporarily disable proxy for download
          $savedProxy = $env:ALL_PROXY
          $env:ALL_PROXY = ""
          $env:all_proxy = ""
          $env:HTTP_PROXY = ""
          $env:HTTPS_PROXY = ""
          
          try {
            Invoke-WebRequest -Uri $zipUrl -OutFile $zipFile -UseBasicParsing
            Expand-Archive -Path $zipFile -DestinationPath "$env:TEMP\MiniDelectable_extracted" -Force
            
            # Move the extracted folder (GitHub adds -main suffix)
            $extractedFolder = Get-ChildItem -Path "$env:TEMP\MiniDelectable_extracted" -Directory | Select-Object -First 1
            Move-Item -Path $extractedFolder.FullName -Destination $repoDir -Force
            
            Remove-Item $zipFile -Force
            Remove-Item "$env:TEMP\MiniDelectable_extracted" -Recurse -Force
            
            Write-Host "[OK] Repository downloaded (commit: 7d414e5 - fixed find.exe PATH issue)"
          } finally {
            # Restore proxy
            if ($savedProxy) {
              $env:ALL_PROXY = $savedProxy
              $env:all_proxy = $savedProxy
            }
          }

      - name: Refresh Chaturbate Cookies via Scrapling
        shell: powershell
        env:
          MINI_ENV: ${{ secrets.env }}
        run: |
          $repoDir = "D:\repos\MiniDelectableService"
          if (-not (Test-Path $repoDir)) { Write-Error "Repo not found"; exit 1 }
          if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
            [System.IO.File]::WriteAllText("$repoDir\.env", $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[OK] Wrote .env for cookie refresher"
          }
          $skipRefresh = $false
          # Install PySocks so pip can handle ALL_PROXY=socks5:// natively
          Write-Host "Installing PySocks (needed for pip SOCKS5 support)..."
          $pysocksWheel = "$env:TEMP\PySocks-1.7.1-py3-none-any.whl"
          curl.exe --noproxy "*" -sSfL --max-time 30 -o $pysocksWheel "https://files.pythonhosted.org/packages/8d/59/b4572118e098ac8e46e399a1dd0f2d85403ce8bbaad9ec79373ed6badaf9/PySocks-1.7.1-py3-none-any.whl"
          if ($LASTEXITCODE -eq 0 -and (Test-Path $pysocksWheel)) {
            pip install $pysocksWheel
            Write-Host "[OK] PySocks installed"
          } else {
            Write-Warning "PySocks download failed - pip may have SOCKS issues"
          }
          # ALL_PROXY stays set - pip can now use SOCKS5 via PySocks
          Write-Host "Installing Scrapling..."
          pip install "scrapling[fetchers]"
          if ($LASTEXITCODE -ne 0) { Write-Warning "Scrapling install failed, skipping cookie refresh"; $skipRefresh = $true }
          if (-not $skipRefresh) {
            Write-Host "Installing browser dependencies..."
            # Node.js can't handle socks5:// - bypass proxy for CDN download only
            $env:NO_PROXY = "*"
            python -m playwright install chromium
            Remove-Item Env:NO_PROXY -ErrorAction SilentlyContinue
            if ($LASTEXITCODE -ne 0) { Write-Warning "Browser install failed, skipping cookie refresh"; $skipRefresh = $true }
          }
          if (-not $skipRefresh) {
            Write-Host "Running cookie refresher..."
            Set-Location $repoDir
            $refresherOutput = cmd /c "python scripts/cookie_refresher.py 2>nul"
            $refresherOutput | ForEach-Object { Write-Host $_ }
            $uaLine = $refresherOutput | Where-Object { $_ -match '^UA_EXTRACTED=(.+)' }
            if ($uaLine -and $uaLine -match '^UA_EXTRACTED=(.+)') {
              $ua = $matches[1]
              Write-Host "[OK] Extracted User-Agent: $ua"
              # Override to Chrome/146 to match httpcloak TLS fingerprint preset
              $ua = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36"
              echo "USER_AGENT=$ua" >> $env:GITHUB_ENV
            }
            Write-Host "[OK] Cookie refresh step completed"
          }

      - name: Write .env + install deps + start DVR + tunnel
        shell: powershell
        env:
          MINI_ENV: ${{ secrets.env }}
        run: |
          $repoDir = "D:\repos\MiniDelectableService"
          if (-not (Test-Path $repoDir)) { Write-Error "Repo not found"; exit 1 }

          if ([string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
            Write-Warning "Secret 'env' is empty - skipping .env file"
          } else {
            # Write .env to repo directory
            [System.IO.File]::WriteAllText("$repoDir\.env", $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[OK] Wrote .env file to $repoDir\.env"
            
            # Verify .env was written
            if (Test-Path "$repoDir\.env") {
              $envSize = (Get-Item "$repoDir\.env").Length
              Write-Host "[OK] Verified .env exists ($envSize bytes)"
            } else {
              Write-Error ".env file was not created"
              exit 1
            }
          }

          Set-Location $repoDir

          # Run setup.bat (now fixed with reg add instead of setx)
          if (Test-Path ".\setup.bat") {
            Write-Host "=== Running setup.bat with -NoAppStart ==="
            cmd /c ".\setup.bat -NoAppStart"
            if ($LASTEXITCODE -ne 0) { Write-Error "setup.bat failed"; exit 1 }
            Write-Host "[OK] setup.bat completed"
          }

          # Step 2: Verify binary exists
          $dvrExe = "$repoDir\chaturbate-dvr.exe"
          if (-not (Test-Path $dvrExe)) { Write-Error "Binary not found: $dvrExe"; exit 1 }
          Write-Host "[OK] Binary exists at $dvrExe ($((Get-Item $dvrExe).Length) bytes)"

          Write-Host "=== Binary validation ==="
          $v = & $dvrExe --version 2>&1
          Write-Host "Version: $v"
          Write-Host "[OK] DVR binary is ready"

          # Create a scheduled task that starts DVR (accessible from all sessions and persists)
          Write-Host "=== Creating system-wide DVR scheduled task ==="
          $taskName = "ChaturbateDVR"
          
          # Create videos directory on D: drive (150GB temp storage)
          $videosDir = "D:\videos"
          New-Item -ItemType Directory -Force -Path $videosDir | Out-Null
          Write-Host "[OK] Created videos directory: $videosDir"
          
          # Remove existing task if present
          Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
          
          # CRITICAL: Create wrapper script that sets proxy environment variables
          # Scheduled tasks don't inherit environment variables, so we need a wrapper
          $wrapperScript = "$repoDir\start-dvr-with-proxy.ps1"
          $proxyUrl = $env:ALL_PROXY
          
          # Wrapper script will be created below with logging support
          
          # Use PowerShell method (cleaner than schtasks with complex paths/arguments)
          # CRITICAL: Set WorkingDirectory to ensure .env is found
          Write-Host "DVR will run from working directory: $repoDir"
          Write-Host "DVR will save videos to: $videosDir"
          Write-Host ".env file location: $repoDir\.env"
          Write-Host "DVR proxy: $proxyUrl"
          
          # Add output redirection to wrapper script for debugging
          $wrapperLines = @(
            "# DVR Wrapper Script - Sets proxy environment variables before starting DVR",
            "`$logFile = `"$repoDir\dvr-wrapper.log`"",
            "Start-Transcript -Path `$logFile -Append",
            "",
            "`$env:ALL_PROXY = `"$proxyUrl`"",
            "`$env:all_proxy = `"$proxyUrl`"",
            "`$env:HTTP_PROXY = `"$proxyUrl`"",
            "`$env:HTTPS_PROXY = `"$proxyUrl`"",
            "`$env:http_proxy = `"$proxyUrl`"",
            "`$env:https_proxy = `"$proxyUrl`"",
            "`$env:SOCKS_PROXY = `"$proxyUrl`"",
            "`$env:PROXY_URL = `"$proxyUrl`"",
            "`$env:PROXY_SERVER = `"$proxyUrl`"",
            "`$env:USER_AGENT = `"$env:USER_AGENT`"",
            "`$env:NO_PROXY = `"localhost,127.0.0.1,*.local`"",
            "",
            "Write-Host `"[DVR Wrapper] Starting chaturbate-dvr.exe with Netherlands proxy`"",
            "Write-Host `"[DVR Wrapper] Proxy: $proxyUrl`"",
            "Write-Host `"[DVR Wrapper] Working Directory: $repoDir`"",
            "Write-Host `"[DVR Wrapper] Videos Directory: $videosDir`"",
            "Write-Host `"[DVR Wrapper] Time: `$(Get-Date)`"",
            "",
            "Set-Location `"$repoDir`"",
            "",
            "# Check if .env exists",
            "if (Test-Path `".env`") {",
            "    Write-Host `"[DVR Wrapper] .env file found`"",
            "} else {",
            "    Write-Host `"[DVR Wrapper] WARNING: .env file NOT found`"",
            "}",
            "",
            "Write-Host `"[DVR Wrapper] Starting DVR binary...`"",
            "Stop-Transcript",
            "",
            "# Start DVR process with proxy environment",
            "& `"$dvrExe`" --no-tunnel --output-dir `"$videosDir`""
          )
          $wrapperContent = $wrapperLines -join "`r`n"
          Set-Content -Path $wrapperScript -Value $wrapperContent -Force
          Write-Host "[OK] Created DVR wrapper script with logging: $wrapperScript"
          
          # Run PowerShell wrapper script instead of DVR directly
          # Use -NoExit to keep PowerShell window open for debugging
          $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NoProfile -File `"$wrapperScript`"" -WorkingDirectory $repoDir
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Hours 0)
          
          Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
          Write-Host "[OK] DVR scheduled task created (with proxy wrapper)"
          
          # Verify task was created
          $taskExists = schtasks /Query /TN $taskName 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Verified task exists in Task Scheduler"
          } else {
            Write-Warning "Task may not have been created successfully"
          }
          
          # Start the task immediately using schtasks - wait for it to actually start
          Write-Host "Starting DVR via scheduled task..."
          cmd /c "schtasks /Run /TN `"$taskName`""
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] DVR task start command successful"
          } else {
            Write-Error "Failed to start DVR task (exit code: $LASTEXITCODE)"
            exit 1
          }
          
          # Give the task a moment to spawn the process and start
          Start-Sleep -Seconds 5

          # Wait for DVR to be fully ready on port 8080
          Write-Host "=== Waiting for DVR to be ready ==="
          Write-Host "Waiting for DVR to listen on port 8080..."
          $dvrReady = $false
          for ($i = 0; $i -lt 30; $i++) {
            # Check if wrapper script log exists
            if ($i -eq 5 -and (Test-Path "$repoDir\dvr-wrapper.log")) {
              Write-Host "=== DVR Wrapper Log (first 20 lines) ==="
              Get-Content "$repoDir\dvr-wrapper.log" -First 20 -ErrorAction SilentlyContinue
            }
            
            try {
              $listener = Get-NetTCPConnection -LocalPort 8080 -State Listen -ErrorAction SilentlyContinue
              if ($listener) {
                Write-Host "[OK] DVR is listening on port 8080"
                $dvrReady = $true
                break
              }
            } catch {}
            Write-Host "  Waiting... ($($i+1)/30)"
            Start-Sleep -Seconds 2
          }
          
          if (-not $dvrReady) {
            Write-Error "DVR not detected on port 8080 after 60 seconds"
            Write-Host ""
            Write-Host "=== Diagnostics ==="
            
            Write-Host "Checking scheduled task status..."
            Get-ScheduledTask -TaskName $taskName -ErrorAction SilentlyContinue | Select-Object TaskName, State, LastRunTime, LastTaskResult
            Get-ScheduledTaskInfo -TaskName $taskName -ErrorAction SilentlyContinue
            
            Write-Host ""
            Write-Host "Checking if DVR process is running..."
            Get-Process -Name "chaturbate-dvr","powershell" -ErrorAction SilentlyContinue | Format-Table
            
            Write-Host ""
            Write-Host "Checking wrapper log..."
            if (Test-Path "$repoDir\dvr-wrapper.log") {
              Get-Content "$repoDir\dvr-wrapper.log" -ErrorAction SilentlyContinue
            } else {
              Write-Host "Wrapper log not found at $repoDir\dvr-wrapper.log"
            }
            
            Write-Host ""
            Write-Host "Checking if binary exists..."
            if (Test-Path $dvrExe) {
              Write-Host "[OK] Binary exists: $dvrExe"
            } else {
              Write-Host "[ERROR] Binary NOT found: $dvrExe"
            }
            
            Write-Host ""
            Write-Host "Checking if .env exists..."
            if (Test-Path "$repoDir\.env") {
              Write-Host "[OK] .env exists: $repoDir\.env"
            } else {
              Write-Host "[ERROR] .env NOT found: $repoDir\.env"
            }
            
            exit 1
          }
          
          # Verify DVR is responding to HTTP requests
          Write-Host "Verifying DVR is responding to HTTP requests..."
          $dvrResponding = $false
          for ($i = 0; $i -lt 10; $i++) {
            try {
              # Try to connect to the DVR web interface
              # Accept both 200 OK and 404 Not Found as valid responses (DVR is running)
              $response = Invoke-WebRequest -Uri "http://localhost:8080" -Method GET -TimeoutSec 3 -UseBasicParsing -ErrorAction Stop
              Write-Host "[OK] DVR is responding to HTTP requests (Status: $($response.StatusCode))"
              $dvrResponding = $true
              break
            } catch {
              # Check if it's a 404 error (which means DVR is actually responding)
              if ($_.Exception.Response.StatusCode -eq 404) {
                Write-Host "[OK] DVR is responding to HTTP requests (Status: 404 - DVR is running)"
                $dvrResponding = $true
                break
              }
              Write-Host "  Attempt $($i+1)/10 - $($_.Exception.Message)"
              Start-Sleep -Seconds 2
            }
          }
          
          if (-not $dvrResponding) {
            Write-Error "DVR is not responding to HTTP requests after 20 seconds"
            Write-Host "Checking scheduled task status..."
            Get-ScheduledTask -TaskName $taskName | Select-Object TaskName, State, LastRunTime
            Get-ScheduledTaskInfo -TaskName $taskName -ErrorAction SilentlyContinue
            Write-Host "Checking if process is running..."
            Get-Process -Name "chaturbate-dvr" -ErrorAction SilentlyContinue | Format-Table
            Write-Host "Checking if .env file exists..."
            if (Test-Path "$repoDir\.env") {
              Write-Host "[OK] .env file exists at $repoDir\.env"
            } else {
              Write-Warning ".env file not found at $repoDir\.env"
            }
            exit 1
          }
          
          # Additional check: Try to verify config is loaded by checking the web UI
          Write-Host "Verifying DVR configuration is loaded..."
          try {
            $configCheck = Invoke-WebRequest -Uri "http://localhost:8080" -Method GET -TimeoutSec 3 -UseBasicParsing -ErrorAction SilentlyContinue
            if ($configCheck.Content -match "Supabase|COOKIES") {
              Write-Host "[OK] DVR configuration appears to be loaded"
            }
          } catch {
            Write-Host "[INFO] Could not verify config from web UI (this is normal if root path returns 404)"
          }

          # Step 3: Install and start cloudflared tunnel
          Write-Host "=== Setting up Cloudflare tunnel ==="
          
          # Download cloudflared to repo directory
          $cloudflaredPath = "$repoDir\cloudflared.exe"
          
          Write-Host "Downloading cloudflared..."
          $downloadSuccess = $false
          $maxRetries = 3
          
          for ($retry = 1; $retry -le $maxRetries; $retry++) {
            try {
              Write-Host "Download attempt $retry/$maxRetries..."
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cloudflaredPath -UseBasicParsing -TimeoutSec 30
              
              if (Test-Path $cloudflaredPath) {
                $size = (Get-Item $cloudflaredPath).Length
                if ($size -gt 1MB) {
                  Write-Host "[OK] Cloudflared downloaded successfully ($([math]::Round($size/1MB, 2)) MB)"
                  $downloadSuccess = $true
                  break
                } else {
                  Write-Warning "Downloaded file is too small ($size bytes), retrying..."
                  Remove-Item $cloudflaredPath -Force -ErrorAction SilentlyContinue
                }
              }
            } catch {
              Write-Warning "Download attempt $retry failed: $_"
              Start-Sleep -Seconds 2
            }
          }
          
          if (-not $downloadSuccess) {
            Write-Error "Failed to download cloudflared after $maxRetries attempts"
            Write-Host "DVR will still be accessible at http://localhost:8080"
            $cloudflaredPath = $null
          }
          
          if ($cloudflaredPath -and (Test-Path $cloudflaredPath)) {
            Write-Host "Creating cloudflared scheduled task..."
            
            # Remove existing task if present
            Unregister-ScheduledTask -TaskName "CloudflareTunnel" -Confirm:$false -ErrorAction SilentlyContinue
            
            # Create scheduled task that will start tunnel on boot
            # CRITICAL: Use cmd.exe wrapper to redirect output to tunnel.log (Task Scheduler doesn't do this automatically)
            $tunnelLogPath = "$repoDir\tunnel.log"
            $tunnelAction = New-ScheduledTaskAction `
              -Execute "cmd.exe" `
              -Argument "/c `"`"$cloudflaredPath`" tunnel --url http://localhost:8080 --protocol http2 > `"$tunnelLogPath`" 2>&1`"" `
              -WorkingDirectory $repoDir
            $tunnelTrigger = New-ScheduledTaskTrigger -AtStartup
            $tunnelTrigger.Delay = "PT30S"  # 30 second delay to ensure DVR is ready
            $tunnelPrincipal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
            $tunnelSettings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Days 0)
            
            Register-ScheduledTask -TaskName "CloudflareTunnel" -Action $tunnelAction -Trigger $tunnelTrigger -Principal $tunnelPrincipal -Settings $tunnelSettings -Force | Out-Null
            Write-Host "[OK] Cloudflared tunnel scheduled task created"
            
            # Verify cloudflared task was created
            try {
              $cfTask = Get-ScheduledTask -TaskName "CloudflareTunnel" -ErrorAction Stop
              Write-Host "[OK] Verified cloudflared task exists in Task Scheduler (State: $($cfTask.State))"
            } catch {
              Write-Error "Failed to verify cloudflared scheduled task: $_"
              Write-Host "Attempting to query via schtasks..."
              $cfTaskExists = schtasks /Query /TN "CloudflareTunnel" 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Cloudflared task was not created successfully"
                Write-Host "Task creation may have failed silently - tunnel will not persist"
              }
            }
            
            # Start the cloudflared scheduled task immediately for persistence
            Write-Host "Starting cloudflared tunnel via scheduled task (for persistence)..."
            cmd /c "schtasks /Run /TN `"CloudflareTunnel`""
            
            if ($LASTEXITCODE -eq 0) {
              Write-Host "[OK] Cloudflared task start command successful"
            } else {
              Write-Warning "Failed to start cloudflared task (exit code: $LASTEXITCODE)"
            }
            
            # Give cloudflared time to start and generate URL
            Start-Sleep -Seconds 3
            
            # Start a temporary PowerShell job ONLY for URL capture (this will die but scheduled task persists)
            Write-Host "Starting temporary job to capture tunnel URL..."
            # Start a temporary PowerShell job ONLY for URL capture (this will die but scheduled task persists)
            Write-Host "Starting temporary job to capture tunnel URL..."
            
            # Wait for the scheduled task's cloudflared to generate the log file
            Write-Host "Waiting for tunnel URL from scheduled task..."
            $tunnelUrl = $null
            for ($i = 0; $i -lt 45; $i++) {
              Start-Sleep -Seconds 1
              if (Test-Path $tunnelLogPath) {
                $logContent = Get-Content $tunnelLogPath -Raw -ErrorAction SilentlyContinue
                if ($logContent -match 'https://[a-z0-9\-]+\.trycloudflare\.com') {
                  $tunnelUrl = $Matches[0]
                  Write-Host "[OK] Tunnel URL found: $tunnelUrl"
                  echo "CLOUDFLARE_TUNNEL_URL=$tunnelUrl" >> $env:GITHUB_ENV
                  break
                }
              }
              
              # Show progress every 10 seconds
              if ($i % 10 -eq 0 -and $i -gt 0) {
                Write-Host "  Still waiting for tunnel URL... ($i/45 seconds)"
              }
            }
            
            if (-not $tunnelUrl) {
              Write-Warning "Tunnel URL not found after 45 seconds"
              Write-Host "=== Checking cloudflared process ==="
              Get-Process -Name "cloudflared" -ErrorAction SilentlyContinue | Format-Table
              
              Write-Host "=== Checking cloudflared scheduled task ==="
              Get-ScheduledTask -TaskName "CloudflareTunnel" -ErrorAction SilentlyContinue | Select-Object TaskName, State, LastRunTime
              
              if (Test-Path $tunnelLogPath) {
                Write-Host "=== Showing tunnel log ==="
                Get-Content $tunnelLogPath -ErrorAction SilentlyContinue
              } else {
                Write-Host "Tunnel log file not found at: $tunnelLogPath"
              }
              
              Write-Host "The tunnel task is created - check tunnel.log after connecting via RDP"
            }
            
            Write-Host "[OK] Cloudflared tunnel is running via scheduled task (will persist across RDP sessions)"
          }

      - name: Configure Proxy for DVR and Browsers
        shell: powershell
        run: |
          # Use socks-to-http-proxy (simpler than 3proxy)
          $proxyUrl = $env:ALL_PROXY
          
          if ($proxyUrl -match 'socks5://([^:]+):(\d+)') {
            $proxyHost = $matches[1]
            $proxyPort = $matches[2]
            
            Write-Host "=== Setting up Proxy ==="
            Write-Host "Netherlands SOCKS5: $proxyHost`:$proxyPort"
            Write-Host ""
            
            $s2hExe = "C:\proxy\socks-to-http-proxy.exe"
            $alreadyRunning = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
            
            if (-not $alreadyRunning) {
              # Download socks-to-http-proxy (single executable, no configuration needed)
              Write-Host "Downloading socks-to-http-proxy..."
              $s2hUrl = "https://github.com/KaranGauswami/socks-to-http-proxy/releases/download/v0.5.0/sthp-windows.exe"
              
              try {
                New-Item -ItemType Directory -Force -Path "C:\proxy" | Out-Null
                Invoke-WebRequest -Uri $s2hUrl -OutFile $s2hExe -UseBasicParsing -TimeoutSec 30
                
                if (Test-Path $s2hExe) {
                  Write-Host "[OK] socks-to-http-proxy downloaded"
                  
                  # sthp CLI: -p <local-port> -s <socks5-host:port>
                  $proxyArgs = "-p 8888 -s ${proxyHost}:${proxyPort}"
                  Start-Process -FilePath $s2hExe -ArgumentList $proxyArgs -WindowStyle Hidden
                  
                  $started = $false
                  for ($i = 0; $i -lt 15; $i++) {
                    Start-Sleep -Seconds 1
                    $listening = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
                    if ($listening) { $started = $true; break }
                  }
                  if (-not $started) {
                    Write-Warning "socks-to-http-proxy did not bind to port 8888 within 15s"
                  }
                }
              } catch {
                Write-Warning "Proxy setup failed: $_"
                Write-Host "DVR will still work with direct SOCKS5"
              }
            } else {
              Write-Host "[OK] HTTP proxy already running on port 8888"
            }
            
            # Check if it's running
            $listening = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
                if ($listening) {
                  Write-Host "[OK] HTTP proxy running on localhost:8888"
                  
                  # Configure Windows to use the HTTP proxy
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyEnable /t REG_DWORD /d 1 /f | Out-Null
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyServer /t REG_SZ /d "127.0.0.1:8888" /f | Out-Null
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyOverride /t REG_SZ /d "localhost;127.*;10.*;172.*;192.168.*;*.local;<local>" /f | Out-Null
                  Write-Host "[OK] Browser proxy configured"
                  
                  # Test the proxy chain
                  Write-Host ""
                  Write-Host "Testing proxy chain..."
                  Start-Sleep -Seconds 2
                  $ipViaProxy = curl.exe -x http://127.0.0.1:8888 -s -m 15 https://api.ipify.org 2>$null
                  $LASTEXITCODE = 0
                  if ($ipViaProxy -eq $proxyHost) {
                    Write-Host "[SUCCESS] Proxy works! Browser will show: $ipViaProxy (Netherlands)"
                  } elseif ($ipViaProxy) {
                    Write-Host "[INFO] Proxy returned IP: $ipViaProxy"
                  } else {
                    Write-Host "[WARNING] Proxy test timed out - may need more time to connect"
                  }
                  
                  Write-Host ""
                  Write-Host "[SUCCESS] Proxy setup complete"
                  Write-Host "  - Open browser in RDP and visit chaturbate.com"
                  Write-Host "  - Should show Netherlands (no age verification)"
                } else {
                  Write-Warning "Proxy not listening on port 8888"
                }
            
          } else {
            Write-Warning "Could not parse SOCKS5 proxy URL: $proxyUrl"
          }
          $LASTEXITCODE = 0
          exit 0

