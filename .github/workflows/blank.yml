          netstat -an | findstr :3389
          $LASTEXITCODE = 0
          Write-Host ""
          Write-Host "Proxy Public IP:"
          try {
            $ip = $null
            $proxy8888 = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
            if ($proxy8888) {
              $ip = curl.exe -x http://127.0.0.1:8888 -s -m 10 https://api.ipify.org 2>$null
            } elseif ($env:ALL_PROXY) {
              $ip = curl.exe -x $env:ALL_PROXY -s -m 10 https://api.ipify.org 2>$null
            }
            if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
              Write-Host "  $($ip.Trim())"
            } elseif ($env:ALL_PROXY) {
              Write-Host "  (unavailable)"
            } else {
              Write-Host "  (no proxy configured)"
            }
          } catch { Write-Host "  (unavailable)" }
          $LASTEXITCODE = 0
          Write-Host ""
          if ($env:CLOUDFLARE_TUNNEL_URL) {
            Write-Host "CLOUDFLARE TUNNEL: $env:CLOUDFLARE_TUNNEL_URL"
          }
          Write-Host "DIRECT (via Tailscale): http://$env:TAILSCALE_IP`:8080"
          exit 0

      - name: Keep Runner Alive
        shell: powershell
        run: |
          Write-Host "Keeping runner alive for up to 5 hours and 50 minutes..."
          Write-Host ""
          if ($env:CLOUDFLARE_TUNNEL_URL) {
            Write-Host "============================================"
            Write-Host "  CLOUDFLARE TUNNEL (PUBLIC ACCESS)"
            Write-Host "============================================"
            Write-Host ""
            Write-Host "  $env:CLOUDFLARE_TUNNEL_URL"
            Write-Host ""
            Write-Host "============================================"
            Write-Host ""
          }
          
          $startTime = if ($env:START_TIME) { [int64]$env:START_TIME } else { [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() }
          $targetDuration = 350 * 60 # 5 hours and 50 minutes in seconds
          
          while ($true) {
            $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
            $elapsed = $now - $startTime
            if ($elapsed -ge $targetDuration) {
              Write-Host "Elapsed time ($elapsed seconds) reached target duration ($targetDuration seconds)."
              break
            }
            
            $remaining = $targetDuration - $elapsed
            $sleepSecs = [Math]::Min($remaining, 60)
            if ($sleepSecs -le 0) { break }
            
            $status = if ($env:CLOUDFLARE_TUNNEL_URL) { " | PUBLIC: $env:CLOUDFLARE_TUNNEL_URL" } else { "" }
            Write-Host "[$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')] Tailscale: $env:TAILSCALE_IP$status (Elapsed: $([Math]::Round($elapsed/60, 1))m, Remaining: $([Math]::Round($remaining/60, 1))m)"
            
            Start-Sleep -Seconds $sleepSecs
          }
          
          Write-Host "Session timeout reached - triggering next workflow run..."
          $branch = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "main" }
          gh workflow run secure-rdp.yml --repo $env:GITHUB_REPOSITORY --ref $branch
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Next workflow triggered - it will start shortly"
          } else {
            Write-Host "[WARNING] Failed to auto-trigger next run. Cron schedule (every 6 hours) will handle it."
          }
          Write-Host "NOTE: DVR and Cloudflare tunnel will continue running via scheduled tasks"
          $LASTEXITCODE = 0
          exit 0
